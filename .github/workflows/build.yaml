name: MALIB MADOCA-PPP Regression Test

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Configure
      run: cmake --preset default

    - name: Build
      run: cmake --build build

    - name: Verify binaries
      run: |
        ls -lh build/rnx2rtkp build/rtkrcv
        build/rnx2rtkp -? || true
        build/rtkrcv   -? || true

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          build/rnx2rtkp
          build/rtkrcv

  test-regression:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: pip install numpy

    - name: Configure
      run: cmake --preset default

    - name: Build
      run: cmake --build build

    # CTest fixture regression_setup extracts data/MALIB_OSS_data.tar.gz.
    # The rtkrcv_rt test is excluded here (-LE realtime) because it requires
    # ~90s of file-stream replay; run it locally or in a dedicated slow-test job.
    - name: Run PPP / SPP regression tests
      run: ctest --test-dir build --output-on-failure -LE realtime
      timeout-minutes: 10

    - name: Accuracy analysis (MADOCA PPP)
      run: |
        OUTPUT_FILE="build/out_madocalib_ppp.pos"
        if [ ! -f "$OUTPUT_FILE" ]; then
          echo "❌ MADOCA PPP output not found"; exit 1
        fi

        DATA_LINES=$(grep -v '^%' "$OUTPUT_FILE" | wc -l)
        echo "MADOCA PPP epochs: $DATA_LINES"

        # MIZU station (Mizusawa, Iwate) reference coordinates
        REF_LAT=39.135150512
        REF_LON=141.132871411
        REF_HGT=117.4272

        grep -v '^%' "$OUTPUT_FILE" | awk \
          -v ref_lat=$REF_LAT -v ref_lon=$REF_LON -v ref_hgt=$REF_HGT '
          BEGIN { count=0; lat_sq=0; lon_sq=0; hgt_sq=0 }
          NF>=6 {
            lat_d = ($3 - ref_lat) * 111320
            lon_d = ($4 - ref_lon) * 111320 * cos(ref_lat*3.14159/180)
            hgt_d = $5 - ref_hgt
            lat_sq += lat_d*lat_d; lon_sq += lon_d*lon_d; hgt_sq += hgt_d*hgt_d
            count++
          }
          END {
            if (count == 0) { print "❌ No data"; exit 1 }
            lat_rms = sqrt(lat_sq/count)
            lon_rms = sqrt(lon_sq/count)
            hgt_rms = sqrt(hgt_sq/count)
            printf "Epochs: %d\n", count
            printf "RMS  N: %.3fm  E: %.3fm  U: %.3fm\n", lat_rms, lon_rms, hgt_rms
            printf "2D RMS: %.3fm   3D RMS: %.3fm\n",
              sqrt(lat_rms^2+lon_rms^2), sqrt(lat_rms^2+lon_rms^2+hgt_rms^2)
            if (lat_rms < 0.3 && lon_rms < 0.3 && hgt_rms < 0.5)
              { print "✅ Accuracy within tolerance" }
            else
              { print "❌ Accuracy below threshold"; exit 1 }
          }'

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/out_*.pos
        retention-days: 7
