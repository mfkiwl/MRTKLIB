#
# rtkrcv_2ch.conf: rtkrcv options for real-time CLAS PPP-RTK (dual-channel L6)
# Test data: 2025/157 (0627157U.bnx + 2025157U_ch1.l6 + ch2.l6)
# Receiver: Trimble NetR9, Antenna: TRM59800.80 NONE
#

# --- Positioning ---
pos1-posmode       =ppp-rtk     # (9:ppp-rtk)
pos1-frequency     =l1+2+3      # (3:l1+2+3 for GPS/QZSS L1+L2+L5, Galileo E1+E5b)
pos1-soltype       =forward     # (0:forward)
pos1-elmask        =15          # (deg)
pos1-snrmask_r     =on          # (0:off,1:on)
pos1-snrmask_b     =off
pos1-snrmask_L1    =10,10,10,10,30,30,30,30,30
pos1-snrmask_L2    =10,10,10,10,30,30,30,30,30
pos1-snrmask_L5    =10,10,10,10,30,30,30,30,30
pos1-dynamics      =on          # kinematic
pos1-tidecorr      =3           # (3:solid+otl-clasgrid+pole)
pos1-ionoopt       =est-adaptive # (9:est-adaptive)
pos1-tropopt       =off
pos1-sateph        =brdc+ssrapc # (3:brdc+ssrapc)
pos1-posopt1       =off         # satellite antenna model
pos1-posopt2       =on          # receiver antenna model
pos1-posopt3       =on          # phase windup
pos1-posopt4       =on          # exclude eclipsing satellites
pos1-posopt5       =on          # raim fde
pos1-posopt6       =meas        # compensate iono time variation (2:meas)
pos1-posopt7       =on          # partial ambiguity resolution
pos1-posopt8       =on          # shapiro time delay
pos1-posopt9       =on          # exclude QZS as reference satellite
pos1-posopt10      =off
pos1-posopt11      =l1+l2       # gps/qzs freq (2:l1+l2)
pos1-exclsats      =
pos1-navsys        =25          # (1:gps+8:gal+16:qzs)
pos1-gridsel       =1000        # CLAS grid selection radius (m)
pos1-rectype       =Trimble NetR9
pos1-rux           =10.0
pos1-ruy           =10.0
pos1-ruz           =10.0

# --- Ambiguity Resolution ---
pos2-armode        =fix-and-hold # (3:fix-and-hold)
pos2-qzsarmode     =on
pos2-aralpha       =10%         # significance level
pos2-arlockcnt     =5
pos2-arelmask      =20          # (deg)
pos2-elmaskhold    =30          # (deg)
pos2-aroutcnt      =1
pos2-arminfix      =0
pos2-arminamb      =6           # min ambiguities for PAR
pos2-armaxdelsat   =4           # max excluded sats for PAR
pos2-varholdamb    =0.001       # fix-and-hold variance (cycle^2)
pos2-slipthres     =0.05        # (m)
pos2-rejionno1     =2.0         # (sigma) L1/L2 residual rejection
pos2-rejionno2     =3.0         # (sigma) dispersive residual rejection
pos2-rejionno3     =3.0         # (sigma) non-dispersive (l0) rejection
pos2-rejionno4     =0.5         # Fix&Hold chi-square threshold
pos2-rejionno5     =5.0         # Fix chi-square threshold
pos2-niter         =1
pos2-baselen       =0           # (m)
pos2-basesig       =0           # (m)
pos2-maxage        =30          # (s)
pos2-rejdiffpse    =10          # (m)
pos2-poserrcnt     =5
pos2-forgetion     =0.3         # iono forgetting factor
pos2-afgainion     =3.0         # iono adaptive filter gain
pos2-prnadpt       =off
pos2-forgetpva     =0.3
pos2-afgainpva     =1.0
pos2-isb           =on          # ISB correction
pos2-phasshft      =table       # 1/4 cycle phase shift correction
pos2-rectype       =CLAS        # reference receiver type (always CLAS)

# --- Kalman Filter ---
stats-eratio1      =50
stats-errphase     =0.010       # (m)
stats-errphaseel   =0.005       # (m)
stats-errphasebl   =0.000       # (m/10km)
stats-errdoppler   =10          # (Hz)
stats-stdbias      =100         # initial bias std (cycle)
stats-stdiono      =0.010       # initial iono std (m)
stats-stdtrop      =0.005       # initial trop std (m)
stats-prnaccelh    =0.2         # (m/s^2)
stats-prnaccelv    =0.1         # (m/s^2)
stats-prnposith    =0.0000      # (m)
stats-prnpositv    =0.0000      # (m)
stats-prnbias      =0.00100     # (m)
stats-prniono      =0.00100     # (m)
stats-prnionomax   =0.05000     # (m)
stats-prntrop      =0.00100     # (m)
stats-tconstiono   =10.0        # (s)
stats-clkstab      =5.00e-12    # (s/s)

# --- Antenna / Receiver ---
ant1-postype       =single      # initial position from SPP
ant1-anttype       =TRM59800.80     NONE
ant1-antdele       =0.0         # (m)
ant1-antdeln       =0.0         # (m)
ant1-antdelu       =0.0         # (m)
ant2-postype       =llh
ant2-pos1          =0
ant2-pos2          =0
ant2-pos3          =0
ant2-anttype       =*
ant2-antdele       =0.0
ant2-antdeln       =0.0
ant2-antdelu       =0.0
ant2-maxaveep      =0
ant2-initrst       =off

# --- Files ---
file-cssrgridfile  =./tests/data/claslib/clas_grid.def
file-blqfile       =./tests/data/claslib/clas_grid.blq
file-eopfile       =./tests/data/claslib/igu00p01.erp
file-rcvantfile    =./tests/data/claslib/igs14_L5copy.atx
file-isbfile       =./tests/data/claslib/isb.tbl
file-phacycfile    =./tests/data/claslib/l2csft.tbl
file-satantfile    =
file-staposfile    =
file-geoidfile     =
file-dcbfile       =
file-tempdir       =
file-geexefile     =
file-solstatfile   =
file-tracefile     =

# --- Output ---
out-solformat      =nmea        # (3:nmea)
out-outhead        =on
out-outopt         =on
out-outvel         =off
out-timesys        =gpst
out-timeform       =tow         # GPS TOW (compatible with compare_ppc.py)
out-timendec       =3
out-degform        =deg
out-fieldsep       =
out-outsingle      =off
out-maxsolstd      =0
out-height         =ellipsoidal
out-geoid          =internal
out-solstatic      =all
out-nmeaintv1      =0
out-nmeaintv2      =0
out-outstat        =off

# --- Input Streams ---
# Stream 1: BINEX observations (master)
# Stream 2: L6 ch2 corrections (uses base stream slot, unused in PPP-RTK)
# Stream 3: L6 ch1 corrections
inpstr1-type       =file        # (2:file)
inpstr2-type       =file        # (2:file) L6 channel 2
inpstr3-type       =file        # (2:file) L6 channel 1
inpstr1-path       =./tests/data/claslib/0627157U.bnx::T::x10
inpstr2-path       =./tests/data/claslib/2025157U_ch2.l6::T::x10
inpstr3-path       =./tests/data/claslib/2025157U_ch1.l6::T::x10
inpstr1-format     =binex       # (10:binex) GNSS observations
inpstr2-format     =clas        # (22:clas) CLAS L6 ch2 corrections
inpstr3-format     =clas        # (22:clas) CLAS L6 ch1 corrections
inpstr2-nmeareq    =off
inpstr2-nmealat    =0
inpstr2-nmealon    =0

# --- Output Streams ---
outstr1-type       =file
outstr2-type       =off
outstr1-path       =./tests/data/claslib/out/rtkrcv_clas_2ch_test.nmea
outstr2-path       =
outstr1-format     =nmea        # (3:nmea)
outstr2-format     =nmea

# --- Log Streams ---
logstr1-type       =off
logstr2-type       =off
logstr3-type       =off
logstr1-path       =
logstr2-path       =
logstr3-path       =

# --- Console ---
console-passwd     =
console-timetype   =gpst
console-soltype    =deg
console-solflag    =off

# --- Server / Misc ---
misc-svrcycle      =10          # (ms)
misc-timeout       =10000       # (ms)
misc-reconnect     =10000       # (ms)
misc-nmeacycle     =5000        # (ms)
misc-buffsize      =32768       # (bytes)
misc-navmsgsel     =all
misc-proxyaddr     =
misc-fswapmargin   =30          # (s)
misc-timeinterp    =on          # interpolate corrections between epochs
misc-maxobsloss    =90          # max epochs without observation before reset
misc-floatcnt      =15          # float epochs before fix attempt
