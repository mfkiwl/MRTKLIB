# conf/benchmark/rtk.conf : Standard RTK configuration for PPC-Dataset benchmark
#
# GNSS-only kinematic RTK using rover.obs + base.obs.
# Base station coordinates are read from the APPROX POSITION XYZ header of
# base.obs (ant2-postype=rinexhead), so this file works for both Nagoya and
# Tokyo without city-specific overrides.
#
# Rover antenna: "Unknown" in RINEX header — wildcard disables PCV correction.
# Base antenna:  Known (TRM115000.10 Nagoya, TRM57971.00 Tokyo) but using
#                wildcard as well to avoid partial-cancel artefacts with an
#                uncorrected rover.
#
pos1-posmode       =kinematic   # (2:kinematic)
pos1-frequency     =l1+2        # dual-freq
pos1-soltype       =forward
pos1-elmask        =10          # (deg)
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-dynamics      =on          # kinematic
pos1-tidecorr      =on          # solid earth tides
pos1-ionoopt       =dual-freq   # L1/L2 ionosphere-free combination
pos1-tropopt       =saas        # Saastamoinen model
pos1-sateph        =brdc
pos1-posopt1       =off         # satellite antenna (off: no precise eph)
pos1-posopt2       =off         # receiver antenna PCV (off: unknown antenna)
pos1-posopt3       =on          # phase windup
pos1-posopt4       =on          # eclipsing satellite exclusion
pos1-posopt5       =on          # RAIM FDE
pos1-exclsats      =
pos1-navsys        =57          # GPS+SBS+GLO+GAL+QZS (matches rover observation constellations)
#
# Rover
ant1-postype       =single
ant1-anttype       =*
ant1-antdele       =0.0000
ant1-antdeln       =0.0000
ant1-antdelu       =0.0000
#
# Base: read coordinates from RINEX header APPROX POSITION XYZ
ant2-postype       =rinexhead
ant2-anttype       =*
ant2-antdele       =0.0000
ant2-antdeln       =0.0000
ant2-antdelu       =0.0000
#
# Ambiguity resolution
pos2-armode        =fix-and-hold
pos2-arthres       =3.0
pos2-arthres1      =0.9999
pos2-arthres2      =0.25
pos2-arlockcnt     =0
pos2-arelmask      =15
pos2-arminfix      =10
pos2-armaxiter     =99
pos2-elmaskhold    =0
pos2-aroutcnt      =5
pos2-maxage        =30          # (s)
pos2-slipthres     =0.05        # (m)
pos2-rejionno      =30          # (m)
pos2-rejgdop       =30
pos2-niter         =1
pos2-baselen       =0
pos2-basesig       =0
#
# Output: NMEA GGA (compare_ppc.py parses GGA sentences)
out-solformat      =nmea
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =tow
out-timendec       =3
out-degform        =deg
out-fieldsep       =
out-height         =ellipsoidal
out-geoid          =internal
out-solstatic      =all
out-nmeaintv1      =0
out-nmeaintv2      =0
out-outstat        =off
#
misc-timeinterp    =on
misc-sbasatsel     =all
file-rcvantfile    =
file-satantfile    =
file-staposfile    =
file-geoidfile     =
file-dcbfile       =
file-tempdir       =
file-geexefile     =
file-solstatfile   =
file-tracefile     =
